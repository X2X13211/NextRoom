{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
  <form method="post">
    {% csrf_token %}
    <fieldset class="module aligned">
      <h2>Выдать Premium по ID пользователя</h2>
      <div class="form-row">
        {{ form.user_id.errors }}
        <label for="id_user_id">ID пользователя:</label>
        {{ form.user_id }}
      </div>
    </fieldset>
    <div class="submit-row">
      <input type="submit" value="Выдать Premium" class="default" />
      <a href="{% url 'admin:chat_userprofile_changelist' %}" class="button cancel-link">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
