services:
  - type: web
    name: nextroom
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn nextroom_project.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: nextroom_project.settings
      - key: PYTHON_VERSION
        value: 3.9.6
